<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>አድሚን ዳሽቦርድ (Supabase)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h2>የአድሚን መቆጣጠሪያ ማዕከል (Supabase) 🛠️</h2>
        <p>ውድድሩን ለመምራት እና ቀጣይ ጥያቄዎችን ለመልቀቅ ይህንን ገጽ ይጠቀሙ።</p>
        <hr style="border-color:#4a5568; margin-bottom:20px;">
        
        <div style="display:flex; justify-content:space-around; margin:20px 0; background:#1a202c; padding:15px; border-radius:8px;">
            <div>
                <h3 style="margin:0;">በሕይወት ያሉ 🏃‍♂️</h3>
                <h1 id="admin-active" style="text-align:center; color:#38a169; margin:10px 0;">0</h1>
            </div>
            <div>
                <h3 style="margin:0;">የተቀነሱ 💀</h3>
                <h1 id="admin-eliminated" style="text-align:center; color:#e53e3e; margin:10px 0;">0</h1>
            </div>
        </div>

        <button id="next-btn" class="admin-btn" onclick="startNextRound()">ውድድሩን ጀምር / ቀጣይ ጥያቄ (Next) ➡️</button>
        <h1 id="timer-display" style="text-align:center; font-size:64px; margin: 20px 0; color:#ecc94b;">10</h1>
        <h3 id="current-q-view" style="text-align:center; color:#aaa;">ውድድሩ አልተጀመረም</h3>
    </div>

    <script>
        const SUPABASE_URL = "https://thyzavvcxzpystxguarp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoeXphdnZjeHpweXN0eGd1YXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTAxMTQsImV4cCI6MjA5MzcyNjExNH0.0eLX-_epguHbdcm0IX_m_xv2OSCVBUVZ0WB38u0s6ZI";
        
        // 🛠️ የተስተካከለው መስመር (window.supabase ተጠቅሟል)
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentQ = -1;
        let timerInterval = null;

        updateAdminStats();

        supabase.channel('admin_player_changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => {
                updateAdminStats();
            }).subscribe();

        async function startNextRound() {
            clearInterval(timerInterval);
            document.getElementById("next-btn").disabled = true;
            currentQ++;

            if(currentQ >= 10) {
                await supabase.from('race_state').update({ status: 'finished' }).eq('id', 1);
                document.getElementById("current-q-view").innerText = "ውድድሩ በስኬት ተጠናቋል! 🏁";
                alert("ውድድሩ አልቋል!");
                return;
            }

            let timeLeft = 10;
            document.getElementById("timer-display").innerText = timeLeft;
            document.getElementById("current-q-view").innerText = `አሁን ያለ የተለቀቀው፡ ጥያቄ ${currentQ + 1}/10`;

            await supabase.from('race_state').update({ current_question_index: currentQ, time_left: timeLeft, status: 'active' }).eq('id', 1);

            timerInterval = setInterval(async () => {
                timeLeft--;
                document.getElementById("timer-display").innerText = timeLeft;
                
                await supabase.from('race_state').update({ time_left: timeLeft }).eq('id', 1);

                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    await endRound();
                }
            }, 1000);
        }

        async function endRound() {
            document.getElementById("current-q-view").innerText = "ዙሩ አልቋል! ሰዎችን የማጣራት ሂደት ላይ ነው...";

            // 1. ሰዓት ያለቀባቸውን መቅጣት
            const { data: players } = await supabase.from('players').select('id').eq('has_answered', false).eq('is_eliminated', false);
            
            if (players && players.length > 0) {
                for(let p of players) {
                    await supabase.from('players').update({ is_eliminated: true }).eq('id', p.id);
                }
            }

            // 2. የተረፉትን ማዘጋጀት
            await supabase.from('players').update({ has_answered: false }).eq('is_eliminated', false);
            await supabase.from('race_state').update({ status: 'round_ended' }).eq('id', 1);
            
            document.getElementById("next-btn").disabled = false;
            document.getElementById("current-q-view").innerText = "ማጣራቱ አልቋል። ቀጣዩን ጥያቄ ለመልቀቅ 'Next' ይጫኑ።";
        }

        async function updateAdminStats() {
            const { data: players, error } = await supabase.from('players').select('is_eliminated');
            if (error || !players) return;
            
            const active = players.filter(p => !p.is_eliminated).length;
            const eliminated = players.length - active;
            
            document.getElementById("admin-active").innerText = active;
            document.getElementById("admin-eliminated").innerText = eliminated;
        }
    </script>
</body>
</html>
