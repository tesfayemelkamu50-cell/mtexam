<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>አድሚን ዳሽቦርድ (Supabase)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h2>የአድሚን መቆጣጠሪያ ማዕከል (Supabase) 🛠️</h2>
        <button id="next-btn" class="admin-btn" onclick="startNextRound()">ቀጣይ ጥያቄ (Next) ➡️</button>
        <h1 id="timer-display" style="text-align:center; font-size:48px;">10</h1>
    </div>

    <script>
        const SUPABASE_URL = "https://thyzavvcxzpystxguarp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoeXphdnZjeHpweXN0eGd1YXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTAxMTQsImV4cCI6MjA5MzcyNjExNH0.0eLX-_epguHbdcm0IX_m_xv2OSCVBUVZ0WB38u0s6ZI";
        const supabase = @supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentQ = -1;
        let timerInterval = null;

        async function startNextRound() {
            document.getElementById("next-btn").disabled = true;
            currentQ++;

            if(currentQ >= 10) {
                await supabase.from('race_state').update({ status: 'finished' }).eq('id', 1);
                alert("ውድድሩ አልቋል!");
                return;
            }

            // የ 10 ሰከንድ ቆጠራን ማስጀመር
            let timeLeft = 10;
            await supabase.from('race_state').update({ current_question_index: currentQ, time_left: timeLeft, status: 'active' }).eq('id', 1);

            timerInterval = setInterval(async () => {
                timeLeft--;
                document.getElementById("timer-display").innerText = timeLeft;
                
                // በየሰከንዱ በ Supabase ላይ ሰዓቱን ማደስ (ለተማሪዎቹ Realtime ይደርሳቸዋል)
                await supabase.from('race_state').update({ time_left: timeLeft }).eq('id', 1);

                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    await endRound();
                }
            }, 1000);
        }

        async function endRound() {
            // ጊዜ ያለቀባቸውንና መልስ ያልሰጡትን መቅጣት (Eliminate ማድረግ)
            const { data: players } = await supabase.from('players').select('*').eq('has_answered', false);
            for(let p of players) {
                await supabase.from('players').update({ is_eliminated: true }).eq('id', p.id);
            }

            // ለቀጣዩ ጥያቄ እንዲዘጋጁ የሰዎችን ሁኔታ ማስተካከል
            await supabase.from('players').update({ has_answered: false }).match({ is_eliminated: false });
            await supabase.from('race_state').update({ status: 'round_ended' }).eq('id', 1);
            
            document.getElementById("next-btn").disabled = false;
            alert("ዙሩ አልቋል! አድሚን ቀጣዩን ጥያቄ መልቀቅ ትችላለህ።");
        }
    </script>
</body>
</html>
